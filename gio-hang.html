<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giỏ hàng của bạn - Sora Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
/* Phục hồi nhan sắc cho nút Thanh toán an toàn */
#openCheckoutBtn {
    width: 100%; /* Tràn viền khung chứa */
    background-color: #1a1a1a; /* Màu đen tuyền */
    color: #ffffff; /* Chữ màu trắng */
    padding: 16px; /* Bơm cho nút bự ra */
    border: none; /* Xóa viền đen mặc định */
    border-radius: 8px; /* Bo góc mượt mà */
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: background-color 0.3s ease; /* Hiệu ứng chuyển màu mượt */
}

/* Khi di chuột vào nút sẽ sáng lên một chút */
#openCheckoutBtn:hover {
    background-color: #333333;
}
/* Nền mờ đen phía sau Popup */
.modal {
    display: none; /* Ẩn mặc định */
    position: fixed;
    z-index: 1000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.6);
    align-items: center;
    justify-content: center;
}

/* Hộp thoại màu trắng ở giữa */
.modal-content {
    background-color: #fff;
    padding: 30px;
    border-radius: 16px;
    width: 90%;
    max-width: 450px;
    position: relative;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    animation: fadeIn 0.3s ease; /* Hiệu ứng trượt nhẹ lên */
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
}

/* Nút Tắt (X) */
.close-btn {
    position: absolute;
    top: 15px;
    right: 20px;
    font-size: 28px;
    cursor: pointer;
    color: #999;
}
.close-btn:hover { color: #333; }

/* Trang trí các ô nhập liệu (Input) */
.input-group { margin-bottom: 15px; }
.input-group input {
    width: 100%;
    padding: 14px;
    border: 1px solid #ddd;
    border-radius: 8px;
    box-sizing: border-box; /* Chống tràn khung */
    font-size: 15px;
}
.input-group input:focus {
    outline: none;
    border-color: #333;
}

/* Nút Xác nhận đen */
.submit-btn {
    width: 100%;
    padding: 15px;
    background-color: #1a1a1a;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 10px;
}
.submit-btn:hover { background-color: #333; }

/* Giao diện Thành công */
.success-icon {
    font-size: 70px;
    color: white;
    background-color: #4CAF50; /* Xanh lá */
    width: 100px;
    height: 100px;
    line-height: 100px;
    border-radius: 50%;
    margin: 0 auto 20px auto;
}
.back-home-btn {
    margin-top: 20px;
    padding: 12px 25px;
    background-color: #FDF5F6; /* Màu hồng Sora */
    color: #333;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
}
        :root {
            --bg-pastel-pink: #FDF5F6; --bg-white: #FFFFFF; --text-dark: #1D1D1F;
            --text-gray: #86868B; --accent-pink: #E8B4B8; --button-dark: #1D1D1F;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-pastel-pink); color: var(--text-dark); line-height: 1.6; }
        
        /* Header */
        header { background-color: rgba(253, 245, 246, 0.9); backdrop-filter: blur(10px); position: fixed; top: 0; width: 100%; z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .nav-container { max-width: 1400px; margin: 0 auto; padding: 0 40px; height: 60px; display: flex; justify-content: space-between; align-items: center; }
        .logo img { height: 50px; width: auto; object-fit: contain; }
        .nav-links { display: flex; gap: 30px; list-style: none; }
        .nav-links a { text-decoration: none; color: var(--text-dark); font-size: 14px; transition: color 0.3s; }
        .nav-links a:hover { color: var(--accent-pink); }

        /* Cart Layout */
        .cart-section { padding: 150px 40px 100px; max-width: 1000px; margin: 0 auto; min-height: 70vh;}
        .cart-title { font-size: 2.5rem; margin-bottom: 40px; font-weight: 500;}
        
        .cart-container { display: flex; gap: 40px; }
        @media (max-width: 768px) { .cart-container { flex-direction: column; } }
        
        .cart-items-wrapper { flex: 2; }
        .cart-item { display: flex; align-items: center; background: var(--bg-white); padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.02); }
        .item-img-placeholder { width: 100px; height: 100px; background-color: #f7e8ea; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 10px; color: var(--text-gray); text-align: center; padding: 10px; margin-right: 20px; }
        .item-details { flex: 1; }
        .item-name { font-size: 1.2rem; font-weight: 500; margin-bottom: 5px; }
        .item-price { color: var(--text-gray); font-size: 1.1rem; }
        .remove-btn { background: none; border: none; color: #ff4d4f; cursor: pointer; font-size: 14px; margin-top: 10px; text-decoration: underline; }
        
        .cart-summary { flex: 1; background: var(--bg-white); padding: 30px; border-radius: 12px; height: fit-content; box-shadow: 0 5px 15px rgba(0,0,0,0.02); }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 15px; color: var(--text-gray); }
        .summary-total { display: flex; justify-content: space-between; margin-top: 20px; padding-top: 20px; border-top: 1px solid #eee; font-size: 1.5rem; font-weight: 600; color: var(--text-dark); }
        
        .btn { display: block; width: 100%; text-align: center; padding: 16px; background-color: var(--button-dark); color: #fff; text-decoration: none; border-radius: 4px; font-weight: 500; margin-top: 30px; border: 1px solid var(--button-dark); cursor: pointer;}
        .btn:hover { background-color: transparent; color: var(--button-dark); }
        .empty-cart { text-align: center; padding: 50px; background: white; border-radius: 12px; color: var(--text-gray); }

        footer { background: var(--text-dark); color: white; padding: 60px; text-align: center; }
    </style>
</head>
<body>

    <header>
        <div class="nav-container">
            <a href="index.html" class="logo"><img src="sora_logo1-removebg-preview.png" alt="Sora"></a>
            <ul class="nav-links">
                <li><a href="index.html">Tiếp tục mua sắm</a></li>
            </ul>
            <div style="font-size: 14px; font-weight: 500;" id="header-cart-count">Giỏ hàng (0)</div>
        </div>
    </header>

    <section class="cart-section">
        <h1 class="cart-title">Giỏ hàng</h1>
        
        <div class="cart-container">
            <div class="cart-items-wrapper" id="cart-list">
                </div>
            
            <div class="cart-summary">
                <h3 style="margin-bottom: 20px;">Tóm tắt đơn hàng</h3>
                <div class="summary-row">
                    <span>Tạm tính</span>
                    <span id="subtotal">0 ₫</span>
                </div>
                <div class="summary-row">
                    <span>Vận chuyển</span>
                    <span>Miễn phí</span>
                </div>
                <div class="summary-total">
                    <span>Tổng cộng</span>
                    <span id="total-price">0 ₫</span>
                </div>
                <button class="nut-thanh-toan" id="openCheckoutBtn">Thanh toán an toàn</button>
            </div>
        </div>
    </section>

    <footer>
        <p style="font-size: 12px; color: #888;">© 2026 Sora Beauty Technology. All rights reserved.</p>
    </footer>

    <script>
        function formatMoney(amount) {
            return Number(amount).toLocaleString('vi-VN') + ' ₫';
        }

        function renderCart() {
            let cart = JSON.parse(localStorage.getItem('sora_cart')) || [];
            let cartList = document.getElementById('cart-list');
            let subtotalEl = document.getElementById('subtotal');
            let totalEl = document.getElementById('total-price');
            
            document.getElementById('header-cart-count').innerText = `Giỏ hàng (${cart.length})`;

            if (cart.length === 0) {
                cartList.innerHTML = `
                    <div class="empty-cart">
                        <p style="margin-bottom: 20px;">Giỏ hàng của bạn đang trống.</p>
                        <a href="index.html" style="color: var(--accent-pink); text-decoration: underline;">Quay lại cửa hàng</a>
                    </div>`;
                subtotalEl.innerText = '0 ₫';
                totalEl.innerText = '0 ₫';
                return;
            }

            let html = '';
            let total = 0;

            cart.forEach((item, index) => {
                html += `
                <div class="cart-item">
<div class="item-img-placeholder" style="background-color: transparent; padding: 0;">
    <img src="${item.img}" alt="${item.name}" style="width: 100%; height: 100%; object-fit: contain; border-radius: 8px;">
</div>
<div class="item-details">
                        <div class="item-name">${item.name}</div>
                        <div class="item-price">${formatMoney(item.price)}</div>
                        <button class="remove-btn" onclick="removeItem(${index})">Xóa khỏi giỏ</button>
                    </div>
                </div>`;
                total += Number(item.price);
            });

            cartList.innerHTML = html;
            subtotalEl.innerText = formatMoney(total);
            totalEl.innerText = formatMoney(total);
        }

        function removeItem(index) {
            let cart = JSON.parse(localStorage.getItem('sora_cart')) || [];
            cart.splice(index, 1); // Xóa 1 phần tử tại vị trí index
            localStorage.setItem('sora_cart', JSON.stringify(cart));
            renderCart(); // Cập nhật lại giao diện
        }

        // Chạy hàm render khi vừa mở trang
        renderCart();
    </script>
<div id="checkoutModal" class="modal">
    <div class="modal-content">
        <span class="close-btn">&times;</span> <div id="checkoutFormContainer">
            <h2 style="text-align: center; margin-bottom: 20px;">Thông tin giao hàng</h2>
            <form id="checkoutForm">
                <div class="input-group">
                    <input type="text" id="fullname" placeholder="Họ và tên" required>
                </div>
                <div class="input-group">
                    <input type="tel" id="phone" placeholder="Số điện thoại" required>
                </div>
                <div class="input-group">
                    <input type="email" id="email" placeholder="Email" required>
                </div>
                <div class="input-group">
                    <input type="text" id="address" placeholder="Địa chỉ giao hàng chi tiết" required>
                </div>
                <div class="input-group">
                    <input type="text" id="promo" placeholder="Mã khuyến mãi (nếu có)">
                </div>
                <button type="submit" class="submit-btn">Xác nhận đặt hàng</button>
            </form>
        </div>

        <div id="successMessage" style="display: none; text-align: center;">
            <div class="success-icon">✓</div>
            <h2 style="color: #4CAF50;">Đặt hàng thành công!</h2>
            <p style="color: #666;">Cảm ơn bạn đã mua sắm. Chúng tôi sẽ sớm liên hệ để giao hàng.</p>
            <button class="back-home-btn" onclick="window.location.href='index.html'">Về trang chủ</button>
        </div>
<script>
    // 1. Khai báo các thành phần
    const modal = document.getElementById("checkoutModal");
    const openBtn = document.getElementById("openCheckoutBtn");
    const closeBtn = document.querySelector(".close-btn");
    const form = document.getElementById("checkoutForm");
    const formContainer = document.getElementById("checkoutFormContainer");
    const successMessage = document.getElementById("successMessage");

    // 2. Mở popup khi bấm nút "Thanh toán an toàn"
    openBtn.onclick = function() {
        modal.style.display = "flex"; // Đổi thành flex để popup canh giữa màn hình
    }

    // 3. Đóng popup khi bấm nút X
    closeBtn.onclick = function() {
        modal.style.display = "none";
    }

    // 4. Đóng popup khi bấm ra ngoài khoảng đen
    window.onclick = function(event) {
        if (event.target == modal) {
            modal.style.display = "none";
        }
    }

    // 5. Xử lý khi bấm nút "Xác nhận đặt hàng"
    form.onsubmit = function(event) {
        event.preventDefault(); // Ngăn trình duyệt load lại trang

        // Ẩn form đi
        formContainer.style.display = "none";
        // Hiện dấu tích xanh thành công lên
        successMessage.style.display = "block";
    }
</script>
    </div>
</div>
</body>
</html>
